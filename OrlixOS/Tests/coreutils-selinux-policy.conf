sensitivity s0;
dominance { s0 }
category c0;
level s0:c0;

mlsconstrain process * l1 == l2;
mlsconstrain filesystem * l1 == l2;
mlsconstrain dir * l1 == l2;
mlsconstrain file * l1 == l2;
mlsconstrain lnk_file * l1 == l2;
mlsconstrain chr_file * l1 == l2;
mlsconstrain blk_file * l1 == l2;
mlsconstrain fifo_file * l1 == l2;
mlsconstrain sock_file * l1 == l2;

type init_t;
type tmp_t;
type unlabeled_t;
type file_t;

allow { init_t tmp_t unlabeled_t file_t } { init_t tmp_t unlabeled_t file_t }:{ @ORLIX_SELINUX_ALL_CLASSES@ } *;

permissive init_t;
permissive tmp_t;
permissive unlabeled_t;
permissive file_t;

role object_r;
role sys_role;
role sys_role types { init_t };
role object_r types { tmp_t unlabeled_t file_t };

user root roles { sys_role object_r } level s0 range s0 - s0:c0;
user user_u roles { object_r } level s0 range s0 - s0:c0;
user system_u roles { sys_role object_r } level s0 range s0 - s0:c0;
user unconfined_u roles { object_r } level s0 range s0 - s0:c0;

sid kernel system_u:sys_role:init_t:s0
sid security system_u:sys_role:init_t:s0
sid unlabeled user_u:object_r:unlabeled_t:s0
sid file system_u:object_r:file_t:s0
sid init system_u:sys_role:init_t:s0
sid any_socket system_u:object_r:file_t:s0
sid port system_u:object_r:file_t:s0
sid netif system_u:object_r:file_t:s0
sid netmsg system_u:object_r:file_t:s0
sid node system_u:object_r:file_t:s0
sid devnull system_u:object_r:file_t:s0

fs_use_xattr tmpfs root:object_r:tmp_t:s0;
fs_use_xattr ext4 root:object_r:tmp_t:s0;
fs_use_trans devpts root:object_r:tmp_t:s0;
fs_use_trans devtmpfs root:object_r:tmp_t:s0;
genfscon proc / root:object_r:tmp_t:s0
genfscon sysfs / root:object_r:tmp_t:s0
