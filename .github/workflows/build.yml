name: CI

on:
  push:
    branches: [main]
    tags:
    - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build IXLandKernel
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Show toolchain version
      run: |
        xcodebuild -version
        swift --version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate --project .

    - name: Build with Xcode (iOS Simulator)
      run: xcodebuild -project IXLandKernel.xcodeproj -scheme IXLandKernel-6.12-arm64 -sdk iphonesimulator -arch arm64 -configuration Debug build

    - name: Test with Xcode (iOS Simulator)
      run: xcodebuild test -project IXLandKernel.xcodeproj -scheme IXLandKernel-6.12-arm64 -sdk iphonesimulator -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17'

    - name: Report build status
      run: echo "Build completed successfully"

  # Release job only runs on tags
  release:
    name: Build and Release XCFrameworks
    runs-on: macos-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate --project .

    - name: Build with Xcode (iOS Simulator)
      run: xcodebuild -project IXLandKernel.xcodeproj -scheme IXLandKernel-6.12-arm64 -sdk iphonesimulator -arch arm64 -configuration Debug build

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body_path: .build/release.md
        draft: false
        prerelease: false

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body_path: .build/release.md
        draft: false
        prerelease: false

    - name: Upload ios_error.h
      id: upload_ios_error
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }} 
        asset_path: ios_error.h
        asset_name: ios_error.h
        asset_content_type: text/plain

    - name: Upload commandDictionary.plist 
      id: upload_commandDictionary
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }} 
        asset_path: ./Resources/commandDictionary.plist
        asset_name: commandDictionary.plist
        asset_content_type: text/plain

    - name: Upload ios_system
      id: upload-ios_system
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }} 
        asset_path: .build/ios_system.xcframework.zip
        asset_name: ios_system.xcframework.zip
        asset_content_type: application/zip
    - name: Upload awk.xcframework
