name: OrlixSystem
options:
  bundleIdPrefix: org.orlix
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: OrlixOS/Sources/distribution/target-settings.xcconfig
  Release: OrlixOS/Sources/distribution/target-settings.xcconfig
settings:
  base:
    CLANG_ENABLE_MODULES: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1"
    SWIFT_VERSION: "6.0"
packages:
  GhosttyKit:
    url: https://github.com/Lakr233/libghostty-spm.git
    exactVersion: 1.2.2
targets:
  OrlixKernel:
    type: framework
    platform: iOS
    sources:
      - path: OrlixKernel/Sources/boot
        includes:
          - "*.c"
      - path: OrlixHostAdapter/Sources/OrlixHostAdapter/boot
        includes:
          - "*.c"
      - path: OrlixHostAdapter/Sources/OrlixHostAdapter/terminal
        includes:
          - "*.c"
      - path: OrlixHostAdapter/Sources/OrlixHostAdapter/memory
        includes:
          - "*.c"
      - path: OrlixHostAdapter/Sources/OrlixHostAdapter/runtime
        includes:
          - "*.c"
      - path: OrlixKernel/Sources/include
        buildPhase: headers
        headerVisibility: public
    dependencies:
      - sdk: CoreFoundation.framework
    settings:
      base:
        DEFINES_MODULE: YES
        INFOPLIST_FILE: OrlixKernel/Sources/Support/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixKernel
        PRODUCT_NAME: OrlixKernel
        ORLIX_PROFILE: release
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/OrlixKernel/Sources
          - $(SRCROOT)/OrlixKernel/Sources/include
          # Temporary arch boot seam include only. Do not add generic Linux
          # or generated Kbuild include roots to Xcode targets.
          - $(SRCROOT)/OrlixKernel/Sources/ports/orlix/overlay/arch/orlix/include
          - $(SRCROOT)/OrlixHostAdapter/Sources
        OTHER_LDFLAGS:
          - $(inherited)
          - $(SRCROOT)/Build/OrlixKernel/$(ORLIX_PROFILE)/$(PLATFORM_NAME)/OrlixKernel.a
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - ORLIX_APP_HOSTED_BOOT=1
  OrlixOS:
    type: framework
    platform: iOS
    sources:
      - path: OrlixOS/Sources/Session
    dependencies:
      - target: OrlixKernel
    postBuildScripts:
      - name: Embed OrlixOS Payload
        basedOnDependencyAnalysis: false
        script: |
          set -eu
          profile="${ORLIX_PROFILE:-release}"
          payload_name="${ORLIX_OS_PAYLOAD_BUNDLE_NAME:?}"
          payload_extension="${ORLIX_OS_PAYLOAD_BUNDLE_EXTENSION:?}"
          source_payload_name="${ORLIX_OS_PAYLOAD_SOURCE_BUNDLE_NAME:?}"
          payload="$ORLIX_OS_PAYLOAD_SOURCE_ROOT/$source_payload_name.$payload_extension"
          if [ ! -d "$payload" ]; then
              echo "missing OrlixOS payload bundle: $payload" >&2
              echo "run: make -f OrlixOS/Makefile kernel-payload PROFILE=$profile" >&2
              exit 1
          fi
          stamp="$payload/.orlix-payload-ready"
          if [ ! -s "$stamp" ]; then
              echo "missing OrlixOS payload stamp: $stamp" >&2
              echo "run: make -f OrlixOS/Makefile kernel-payload PROFILE=$profile" >&2
              exit 1
          fi
          rootfs_input="$(sed -n 's/^rootfs_input=//p' "$stamp")"
          base_root_tree_input="$(sed -n 's/^base_root_tree_input=//p' "$stamp")"
          state_root_tree_input="$(sed -n 's/^state_root_tree_input=//p' "$stamp")"
          case "$rootfs_input" in
              "$ORLIX_OS_ROOT_INITRAMFS_INPUT") ;;
              *)
                  echo "OrlixOS payload is not packaged from the product rootfs: $rootfs_input" >&2
                  echo "run: make -f OrlixOS/Makefile kernel-payload PROFILE=$profile" >&2
                  exit 1
                  ;;
          esac
          case "$base_root_tree_input" in
              "$ORLIX_OS_BASE_ROOT_TREE_INPUT") ;;
              *)
                  echo "OrlixOS payload is missing the product base root tree: $base_root_tree_input" >&2
                  echo "run: make -f OrlixOS/Makefile kernel-payload PROFILE=$profile" >&2
                  exit 1
                  ;;
          esac
          case "$state_root_tree_input" in
              "$ORLIX_OS_STATE_ROOT_TREE_INPUT") ;;
              *)
                  echo "OrlixOS payload is missing the product state root tree: $state_root_tree_input" >&2
                  echo "run: make -f OrlixOS/Makefile kernel-payload PROFILE=$profile" >&2
                  exit 1
                  ;;
          esac
          destination="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/$payload_name.$payload_extension"
          rm -rf "$destination"
          cp -R "$payload" "$destination"
    settings:
      base:
        DEFINES_MODULE: YES
        INFOPLIST_FILE: OrlixOS/Sources/Session/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixOS
        PRODUCT_NAME: OrlixOS
        ORLIX_PROFILE: release
        ORLIX_OS_PAYLOAD_SOURCE_ROOT: $(SRCROOT)/Build/OrlixKernel/payload
        ORLIX_OS_ROOT_INITRAMFS_INPUT: $(SRCROOT)/Build/OrlixOS/rootfs/$(ORLIX_PROFILE)/rootfs/initramfs.cpio.gz
        ORLIX_OS_BASE_ROOT_TREE_INPUT: $(SRCROOT)/Build/OrlixOS/rootfs/$(ORLIX_PROFILE)/base-tree
        ORLIX_OS_STATE_ROOT_TREE_INPUT: $(SRCROOT)/Build/OrlixOS/rootfs/$(ORLIX_PROFILE)/state-tree
  OrlixOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixOS/Tests/XCTest/OrlixOSTests
    dependencies:
      - target: OrlixTestRunner
      - target: OrlixOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixOSTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTestRunner.app/OrlixTestRunner
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixTerminal:
    type: application
    platform: iOS
    sources:
      - path: OrlixTerminal/Sources
    dependencies:
      - target: OrlixOS
        embed: true
      - target: OrlixKernel
        embed: true
      - package: GhosttyKit
        products:
          - GhosttyTerminal
          - GhosttyTheme
    settings:
      base:
        INFOPLIST_FILE: OrlixTerminal/Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixTerminal
        PRODUCT_NAME: OrlixTerminal
  OrlixTestRunner:
    type: application
    platform: iOS
    sources:
      - path: OrlixTestRunner/Sources
    dependencies:
      - target: OrlixOS
        embed: true
      - target: OrlixKernel
        embed: true
    postBuildScripts:
      - name: Embed Orlix Upstream Test Rootfs Bundles
        basedOnDependencyAnalysis: false
        script: |
          set -eu
          profile="${ORLIX_PROFILE:-release}"
          copy_if_present() {
              source="$SRCROOT/$1"
              name="$2"
              destination="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/$name"
              if [ -d "$source" ]; then
                  rm -rf "$destination"
                  cp -R "$source" "$destination"
              fi
          }
          extension="${ORLIX_OS_TEST_INITRAMFS_BUNDLE_EXTENSION:?}"
          copy_if_present "$ORLIX_OS_KSELFTEST_INITRAMFS_SOURCE_ROOT/$profile/$ORLIX_OS_KSELFTEST_INITRAMFS_BUNDLE_NAME.$extension" "$ORLIX_OS_KSELFTEST_INITRAMFS_BUNDLE_NAME.$extension"
          copy_if_present "$ORLIX_OS_MLIBC_INITRAMFS_SOURCE_ROOT/$profile/$ORLIX_OS_MLIBC_INITRAMFS_BUNDLE_NAME.$extension" "$ORLIX_OS_MLIBC_INITRAMFS_BUNDLE_NAME.$extension"
          copy_if_present "$ORLIX_OS_COREUTILS_INITRAMFS_SOURCE_ROOT/$profile/$ORLIX_OS_COREUTILS_INITRAMFS_BUNDLE_NAME.$extension" "$ORLIX_OS_COREUTILS_INITRAMFS_BUNDLE_NAME.$extension"
    settings:
      base:
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixTestRunner
        PRODUCT_NAME: OrlixTestRunner
        ORLIX_PROFILE: release
  OrlixKernelHostProofTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixKernel/Tests/XCTest/OrlixKernelHostProofTests
    dependencies:
      - target: OrlixTerminal
      - target: OrlixKernel
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixKernelHostProofTests
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/OrlixKernel/Sources/include
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - ORLIX_APP_HOSTED_BOOT=1
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTerminal.app/OrlixTerminal
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixLinuxProofOutputParserTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixKernel/Tests/XCTest/OrlixLinuxProofOutputParserTests
      - path: OrlixKernel/Tests/Fixtures/KUnit
        type: folder
        buildPhase: resources
      - path: OrlixKernel/Tests/Fixtures/Kselftest
        type: folder
        buildPhase: resources
    dependencies:
      - target: OrlixTerminal
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixLinuxProofOutputParserTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTerminal.app/OrlixTerminal
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixHostAdapterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixHostAdapter/Tests/XCTest/OrlixHostAdapterTests
    dependencies:
      - target: OrlixTerminal
      - target: OrlixKernel
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixHostAdapterTests
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/OrlixHostAdapter/Sources
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTerminal.app/OrlixTerminal
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixTerminalProofDriverTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixTerminal/Tests/XCTest/OrlixTerminalProofDriverTests
    dependencies:
      - target: OrlixTerminal
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixTerminalProofDriverTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTerminal.app/OrlixTerminal
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixTestRunnerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixTestRunner/Tests/XCTest/OrlixTestRunnerTests
    dependencies:
      - target: OrlixTestRunner
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixTestRunnerTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTestRunner.app/OrlixTestRunner
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixKernelUpstreamTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixTestRunner/Tests/XCTest/Support
      - path: OrlixTestRunner/Tests/XCTest/OrlixKernelUpstreamTests
    dependencies:
      - target: OrlixTestRunner
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixKernelUpstreamTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTestRunner.app/OrlixTestRunner
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixMLibCUpstreamTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixTestRunner/Tests/XCTest/Support
      - path: OrlixTestRunner/Tests/XCTest/OrlixMLibCUpstreamTests
    dependencies:
      - target: OrlixTestRunner
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixMLibCUpstreamTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTestRunner.app/OrlixTestRunner
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixCoreutilsUpstreamTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixTestRunner/Tests/XCTest/Support
      - path: OrlixTestRunner/Tests/XCTest/OrlixCoreutilsUpstreamTests
    dependencies:
      - target: OrlixTestRunner
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixCoreutilsUpstreamTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTestRunner.app/OrlixTestRunner
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixPTYRuntimeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixTestRunner/Tests/XCTest/OrlixPTYRuntimeTests
    dependencies:
      - target: OrlixTestRunner
      - target: OrlixOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixPTYRuntimeTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTestRunner.app/OrlixTestRunner
        BUNDLE_LOADER: $(TEST_HOST)
schemes:
  OrlixKernel:
    build:
      targets:
        OrlixKernel: all
  OrlixTerminal:
    build:
      targets:
        OrlixTerminal: all
    run:
      config: Debug
      executable: OrlixTerminal
  OrlixOSTests:
    build:
      targets:
        OrlixTestRunner: all
        OrlixOSTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixOSTests
  OrlixKernelHostProofTests:
    build:
      targets:
        OrlixTerminal: all
        OrlixKernelHostProofTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixKernelHostProofTests
  OrlixLinuxProofOutputParserTests:
    build:
      targets:
        OrlixTerminal: all
        OrlixLinuxProofOutputParserTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixLinuxProofOutputParserTests
  OrlixHostAdapterTests:
    build:
      targets:
        OrlixTerminal: all
        OrlixHostAdapterTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixHostAdapterTests
  OrlixTerminalProofDriverTests:
    build:
      targets:
        OrlixTerminal: all
        OrlixTerminalProofDriverTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixTerminalProofDriverTests
  OrlixTestRunnerTests:
    build:
      targets:
        OrlixTestRunner: all
        OrlixTestRunnerTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixTestRunnerTests
  OrlixPTYRuntimeTests:
    build:
      targets:
        OrlixTestRunner: all
        OrlixPTYRuntimeTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixPTYRuntimeTests
  OrlixKernelUpstreamTests:
    build:
      targets:
        OrlixTestRunner: all
        OrlixKernelUpstreamTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixKernelUpstreamTests
  OrlixMLibCUpstreamTests:
    build:
      targets:
        OrlixTestRunner: all
        OrlixMLibCUpstreamTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixMLibCUpstreamTests
  OrlixCoreutilsUpstreamTests:
    build:
      targets:
        OrlixTestRunner: all
        OrlixCoreutilsUpstreamTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixCoreutilsUpstreamTests
