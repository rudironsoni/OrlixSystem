name: IXLandSystem
settings:
  base:
    GCC_TREAT_WARNINGS_AS_ERRORS: true
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    LINUX_UAPI_VERSION: '6.12'
    LINUX_UAPI_ARCH: arm64
    LINUX_VENDOR_ROOT: $(SRCROOT)/third_party/linux
    LINUX_UAPI_VENDOR_ROOT: $(LINUX_VENDOR_ROOT)/uapi
    LINUX_UAPI_ROOT: $(LINUX_UAPI_VENDOR_ROOT)/$(LINUX_UAPI_VERSION)/$(LINUX_UAPI_ARCH)
    LINUX_UAPI_INCLUDE_ROOT: $(LINUX_UAPI_ROOT)/include
    LINUX_KHEADERS_VENDOR_ROOT: $(LINUX_VENDOR_ROOT)/kheaders
    LINUX_KHEADERS_ROOT: $(LINUX_KHEADERS_VENDOR_ROOT)/$(LINUX_UAPI_VERSION)/$(LINUX_UAPI_ARCH)
    LINUX_KHEADERS_OBJTREE_ROOT: $(LINUX_KHEADERS_ROOT)/objtree
    LINUX_KHEADERS_SRCTREE_ROOT: $(LINUX_KHEADERS_ROOT)/srctree
    LINUX_ABI_VENDOR_ROOT: $(LINUX_VENDOR_ROOT)/abi
    LINUX_ABI_ROOT: $(LINUX_ABI_VENDOR_ROOT)/$(LINUX_UAPI_VERSION)/$(LINUX_UAPI_ARCH)
    LINUX_ABI_INCLUDE_ROOT: $(LINUX_ABI_ROOT)/include
targets:
  IXLandSystem:
    type: library.static
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    settings:
      HEADER_SEARCH_PATHS:
      - $(SRCROOT)/include
      - $(SRCROOT)
      - $(LINUX_UAPI_INCLUDE_ROOT)
      - $(LINUX_UAPI_INCLUDE_ROOT)/uapi
      GCC_PREPROCESSOR_DEFINITIONS:
      - _XOPEN_SOURCE
      CLANG_ENABLE_OBJC_ARC: true
      CLANG_WARN_DOCUMENTATION_COMMENTS: true
      OTHER_CFLAGS:
      - -fvisibility=hidden
    sources:
    - path: fs/eventpoll.c
      group: fs
    - path: fs/exec.c
      group: fs
    - path: fs/fcntl.c
      group: fs
    - path: fs/fdtable.c
      group: fs
    - path: internal/ios/fs/backing_io.m
      group: internal/ios/fs
    - path: internal/ios/fs/backing_io.h
      group: internal/ios/fs
    - path: internal/ios/fs/errno_host.c
      group: internal/ios/fs
    - path: internal/ios/fs/open_flags.c
      group: internal/ios/fs
    - path: internal/ios/fs/path_host.c
      group: internal/ios/fs
    - path: internal/ios/fs/path_host.h
      group: internal/ios/fs
    - path: internal/ios/fs/memfd_host.c
      group: internal/ios/fs
    - path: internal/ios/fs/memfd_host.h
      group: internal/ios/fs
    - path: internal/ios/fs/backing_paths.m
      group: internal/ios/fs
    - path: fs/inode.c
      group: fs
    - path: fs/ioctl.c
      group: fs
    - path: fs/mount.c
      group: fs
      compilerFlags:
      - -I$(LINUX_ABI_INCLUDE_ROOT)
    - path: fs/namei.c
      group: fs
    - path: fs/open.c
      group: fs
    - path: fs/pipe.c
      group: fs
    - path: fs/poll.c
      group: fs
    - path: fs/pty.c
      group: fs
    - path: fs/path.c
      group: fs
    - path: fs/read_write.c
      group: fs
    - path: fs/readdir.c
      group: fs
    - path: internal/ios/fs/epoll_bridge.c
      group: internal/ios/fs
    - path: fs/stat.c
      group: fs
    - path: fs/uio.c
      group: fs
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: fs/super.c
      group: fs
      compilerFlags:
      - -I$(LINUX_ABI_INCLUDE_ROOT)
    - path: fs/vfs.c
      group: fs
    - path: fs/xattr.c
      group: fs
    - path: kernel/cgroup.c
      group: kernel
    - path: kernel/cred.c
      group: kernel
    - path: kernel/exit.c
      group: kernel
    - path: kernel/fork.c
      group: kernel
    - path: kernel/futex.c
      group: kernel
    - path: kernel/init.c
      group: kernel
    - path: kernel/mm.c
      group: kernel
    - path: kernel/net/network.c
      group: kernel/net
    - path: kernel/net/socket.c
      group: kernel/net
    - path: kernel/net/socket.h
      group: kernel/net
    - path: kernel/pid.c
      group: kernel
    - path: kernel/ptrace.c
      group: kernel
    - path: kernel/random.c
      group: kernel
    - path: kernel/resource.c
      group: kernel
    - path: kernel/seccomp.c
      group: kernel
    - path: kernel/signal.c
      group: kernel
    - path: internal/ios/kernel/signal_bridge.c
      group: internal/ios/kernel
    - path: kernel/sync.c
      group: kernel
    - path: kernel/sys.c
      group: kernel
    - path: kernel/task.c
      group: kernel
    - path: kernel/time.c
      group: kernel
    - path: kernel/uts.c
      group: kernel
    - path: kernel/wait_queue.c
      group: kernel
    - path: internal/ios/kernel/sync.c
      group: internal/ios/kernel
    - path: internal/ios/kernel/clock.c
      group: internal/ios/kernel
    - path: internal/ios/fs/sync.c
      group: internal/ios/fs
    - path: kernel/wait.c
      group: kernel
    - path: observability/ixland_observability.c
      group: observability
    - path: runtime/aarch64/exec_context.c
      group: runtime/aarch64
    - path: runtime/aarch64/elf_reloc.c
      group: runtime/aarch64
    - path: runtime/syscall.c
      group: runtime
    - path: runtime/native/registry.c
      group: runtime/native
  IXLandSystemLinuxKernelTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    sources:
    - IXLandSystemLinuxKernelTests/SignalTests.m
    - IXLandSystemLinuxKernelTests/TaskGroupTests.m
    - IXLandSystemLinuxKernelTests/CgroupTests.m
    - IXLandSystemLinuxKernelTests/CredentialTests.m
    - IXLandSystemLinuxKernelTests/VFSPathTests.m
    - IXLandSystemLinuxKernelTests/FutexTests.m
    - IXLandSystemLinuxKernelTests/RootfsBootstrapTests.m
    - IXLandSystemLinuxKernelTests/KernelBootTests.m
    - IXLandSystemLinuxKernelTests/KernelInitTests.m
    - IXLandSystemLinuxKernelTests/PTYSessionTests.m
    - IXLandSystemLinuxKernelTests/PTYJobControlTests.m
    - IXLandSystemLinuxKernelTests/WaitJobControlTests.m
    - IXLandSystemLinuxKernelTests/PipeTests.m
    - IXLandSystemLinuxKernelTests/ReadinessTests.m
    - IXLandSystemLinuxKernelTests/EpollTests.m
    - IXLandSystemLinuxKernelTests/FcntlTests.m
    - IXLandSystemLinuxKernelTests/ExecFdTests.m
    - IXLandSystemLinuxKernelTests/ExecSyscallTests.m
    - IXLandSystemLinuxKernelTests/NativeSyscallTests.m
    - IXLandSystemLinuxKernelTests/TaskExecTests.m
    - IXLandSystemLinuxKernelTests/UTSTests.m
    - IXLandSystemLinuxKernelTests/NamespaceTests.m
    - IXLandSystemLinuxKernelTests/ProcfsNamespaceTests.m
    - IXLandSystemLinuxKernelTests/DevfsTests.m
    - IXLandSystemLinuxKernelTests/SeccompTests.m
    - IXLandSystemLinuxKernelTests/PtraceTests.m
    - path: IXLandSystemLinuxKernelTests/LinuxUAPICompileSmoke.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/LinuxKHeadersCompileSmoke.c
      compilerFlags:
      - -D__KERNEL__
      - -I$(LINUX_KHEADERS_OBJTREE_ROOT)/arch/$(LINUX_UAPI_ARCH)/include/generated
      - -I$(LINUX_KHEADERS_OBJTREE_ROOT)/arch/$(LINUX_UAPI_ARCH)/include/generated/uapi
      - -I$(LINUX_KHEADERS_SRCTREE_ROOT)/arch/$(LINUX_UAPI_ARCH)/include
      - -I$(LINUX_KHEADERS_SRCTREE_ROOT)/arch/$(LINUX_UAPI_ARCH)/include/uapi
      - -I$(LINUX_KHEADERS_OBJTREE_ROOT)/include/generated/uapi
      - -I$(LINUX_KHEADERS_OBJTREE_ROOT)/include
      - -I$(LINUX_KHEADERS_SRCTREE_ROOT)/include/uapi
      - -I$(LINUX_KHEADERS_SRCTREE_ROOT)/include
    - path: IXLandSystemLinuxKernelTests/KernelBoot.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/KernelInitContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/PTYSessionContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/PTYJobControlContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/WaitJobControlContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/PipeContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/ReadinessContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/EpollContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/PtraceContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - IXLandSystemLinuxKernelTests/PTYSessionContract.h
    - IXLandSystemLinuxKernelTests/PTYJobControlContract.h
    - IXLandSystemLinuxKernelTests/WaitJobControlContract.h
    - IXLandSystemLinuxKernelTests/PipeContract.h
    - IXLandSystemLinuxKernelTests/ReadinessContract.h
    - IXLandSystemLinuxKernelTests/EpollContract.h
    - IXLandSystemLinuxKernelTests/PtraceContract.h
    - path: IXLandSystemLinuxKernelTests/CgroupContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - IXLandSystemLinuxKernelTests/CgroupContract.h
    - IXLandSystemLinuxKernelTests/PTYSessionIoctlShim.c
    - path: IXLandSystemLinuxKernelTests/FutexUAPICompileSmoke.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/FutexContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - IXLandSystemLinuxKernelTests/FutexContract.h
    - path: IXLandSystemLinuxKernelTests/LinuxUAPITestSupport.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - IXLandSystemLinuxKernelTests/LinuxUAPITestSupport.h
    - path: IXLandSystemLinuxKernelTests/VFSAtContract.c
      compilerFlags:
      - -I$(LINUX_ABI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/FcntlContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/ExecFdContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/ExecSyscallContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/NativeSyscallContract.c
      compilerFlags:
      - -I$(LINUX_ABI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - IXLandSystemLinuxKernelTests/NativeSyscallContract.h
    - path: IXLandSystemLinuxKernelTests/SignalSyscallContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - IXLandSystemLinuxKernelTests/SignalSyscallContract.h
    - path: IXLandSystemLinuxKernelTests/SyscallUioContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - IXLandSystemLinuxKernelTests/SyscallUioContract.h
    - path: IXLandSystemLinuxKernelTests/TaskExecContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - path: IXLandSystemLinuxKernelTests/UTSContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - IXLandSystemLinuxKernelTests/UTSContract.h
    - path: IXLandSystemLinuxKernelTests/NamespaceContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - IXLandSystemLinuxKernelTests/NamespaceContract.h
    - path: IXLandSystemLinuxKernelTests/ProcfsNamespaceContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - IXLandSystemLinuxKernelTests/ProcfsNamespaceContract.h
    - path: IXLandSystemLinuxKernelTests/DevfsContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - IXLandSystemLinuxKernelTests/DevfsContract.h
    - path: IXLandSystemLinuxKernelTests/SeccompContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
      - -I$(LINUX_UAPI_INCLUDE_ROOT)/uapi
    - IXLandSystemLinuxKernelTests/SeccompContract.h
    dependencies:
    - target: IXLandSystem
    settings:
      GENERATE_INFOPLIST_FILE: true
      HEADER_SEARCH_PATHS:
      - $(SRCROOT)/include
      - $(SRCROOT)
      BUNDLE_LOADER: ''
  IXLandSystemHostBridgeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    sources:
    - IXLandSystemHostBridgeTests/HostBridgeSmokeTests.m
    - IXLandSystemHostBridgeTests/PTYHostBridgeTests.m
    - IXLandSystemHostBridgeTests/VFSPathHostBridgeTests.m
    - IXLandSystemHostBridgeTests/RootfsBootstrapTests.m
    - IXLandSystemHostBridgeTests/HostTestSupport.c
    - IXLandSystemHostBridgeTests/HostTestSupport.h
    - IXLandSystemHostBridgeTests/PTYTestSupport.c
    - IXLandSystemHostBridgeTests/PTYTestSupport.h
    dependencies:
    - target: IXLandSystem
    settings:
      GENERATE_INFOPLIST_FILE: true
      HEADER_SEARCH_PATHS:
      - $(SRCROOT)/include
      - $(SRCROOT)
      - $(SRCROOT)/internal/ios
      - $(SRCROOT)/internal/ios/fs
      - $(SRCROOT)/internal/ios/kernel
      BUNDLE_LOADER: ''
configurations:
  Debug:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      GCC_OPTIMIZATION_LEVEL: '0'
      SWIFT_OPTIMIZATION_LEVEL: -Onone
  Release:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      GCC_OPTIMIZATION_LEVEL: s
      SWIFT_OPTIMIZATION_LEVEL: -O
schemes:
  IXLandSystem-6.12-arm64:
    build:
      targets:
        IXLandSystem: all
        IXLandSystemLinuxKernelTests: all
        IXLandSystemHostBridgeTests: all
    test:
      targets:
      - IXLandSystemLinuxKernelTests
      - IXLandSystemHostBridgeTests
