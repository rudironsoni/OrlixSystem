name: OrlixKernel
settings:
  base:
    GCC_TREAT_WARNINGS_AS_ERRORS: true
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    LINUX_VERSION: '6.12'
    LINUX_ARCH: orlix
    CLANG_BUILTIN_INCLUDE_ROOT: $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/21/include
targets:
  OrlixKernel:
    type: library.static
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    settings:
      ALWAYS_SEARCH_USER_PATHS: false
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/OrlixKernel/include
        - $(SRCROOT)/Linux/ports/orlix/overlay/arch/orlix/include
      USE_HEADERMAP: false
      CLANG_ENABLE_MODULES: false
      CLANG_ENABLE_OBJC_ARC: true
      CLANG_WARN_DOCUMENTATION_COMMENTS: false
      OTHER_CFLAGS:
        - -fvisibility=hidden
    sources:
      - path: boot/dtb.c
      - path: boot/image.c
      - path: boot/initrd.c
      - path: boot/loader.c
      - path: boot/params.c
      - path: boot/rootfs.c
      - path: Linux/ports/orlix/overlay/arch/orlix/boot/boot.c
      - path: OrlixKernel/include
        buildPhase: headers
        headerVisibility: public
configurations:
  Debug:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      GCC_OPTIMIZATION_LEVEL: '0'
      SWIFT_OPTIMIZATION_LEVEL: -Onone
  Release:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      GCC_OPTIMIZATION_LEVEL: s
      SWIFT_OPTIMIZATION_LEVEL: -O
schemes:
  OrlixKernel-6.12-arm64:
    build:
      targets:
        OrlixKernel: all
