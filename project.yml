name: OrlixKernel
settings:
  base:
    GCC_TREAT_WARNINGS_AS_ERRORS: true
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    # End-state policy:
    # - OrlixKernel consumes only kernel-owned headers plus vendored Linux truth
    # - OrlixHostAdapter is private host implementation only
    # - cross-target declarations must move under OrlixKernel private contract roots
    # Current OrlixHostAdapter include usage is transitional until the seam refactor lands.
    LINUX_VERSION: '6.12'
    LINUX_ARCH: arm64
    LINUX_VENDOR_ROOT: $(SRCROOT)/third_party/linux
    LINUX_ROOT: $(LINUX_VENDOR_ROOT)/$(LINUX_VERSION)/$(LINUX_ARCH)
    LINUX_UAPI_ROOT: $(LINUX_ROOT)/uapi
    LINUX_UAPI_INCLUDE_ROOT: $(LINUX_UAPI_ROOT)/include
    LINUX_KHEADERS_ROOT: $(LINUX_ROOT)/kheaders
    LINUX_KHEADERS_SOURCE_ROOT: $(LINUX_KHEADERS_ROOT)/source
    LINUX_KHEADERS_GENERATED_ROOT: $(LINUX_KHEADERS_ROOT)/generated
targets:
  OrlixKernel:
    type: library.static
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    settings:
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/OrlixKernel
        - $(SRCROOT)/OrlixKernel/include
        - $(SRCROOT)/OrlixKernel/internal/private
        - $(LINUX_UAPI_INCLUDE_ROOT)
      GCC_PREPROCESSOR_DEFINITIONS:
      - _XOPEN_SOURCE
      CLANG_ENABLE_OBJC_ARC: true
      CLANG_WARN_DOCUMENTATION_COMMENTS: true
      OTHER_CFLAGS:
      - -fvisibility=hidden
    sources:
    - path: OrlixKernel/fs/eventpoll.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/exec.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/fcntl.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/fdtable.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/inode.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/ioctl.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/mount.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/namei.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/open.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/pipe.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/poll.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/pty.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/path.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/read_write.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/readdir.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/stat.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/uio.c
      group: OrlixKernel/fs
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernel/fs/super.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/vfs.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/xattr.c
      group: OrlixKernel/fs
    - path: OrlixKernel/kernel/cgroup.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/cred.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/exit.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/fork.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/futex.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/init.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/mm.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/net/network.c
      group: OrlixKernel/kernel/net
    - path: OrlixKernel/kernel/net/socket.c
      group: OrlixKernel/kernel/net
    - path: OrlixKernel/kernel/net/socket.h
      group: OrlixKernel/kernel/net
    - path: OrlixKernel/kernel/pid.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/ptrace.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/random.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/resource.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/seccomp.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/signal.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/sync.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/sys.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/task.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/time.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/uts.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/wait_queue.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/wait.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/observability/orlix_observability.c
      group: OrlixKernel/observability
    - path: OrlixKernel/runtime/aarch64/exec_context.c
      group: OrlixKernel/runtime/aarch64
    - path: OrlixKernel/runtime/aarch64/elf_reloc.c
      group: OrlixKernel/runtime/aarch64
    - path: OrlixKernel/runtime/syscall.c
      group: OrlixKernel/runtime
    - path: OrlixKernel/runtime/native/registry.c
      group: OrlixKernel/runtime/native
    dependencies:
    - target: OrlixHostAdapter
  OrlixHostAdapter:
    type: library.static
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    settings:
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)
        - $(SRCROOT)/OrlixKernel
        - $(SRCROOT)/OrlixKernel/include
        - $(SRCROOT)/OrlixKernel/internal/private
        - $(LINUX_UAPI_INCLUDE_ROOT)
      GCC_PREPROCESSOR_DEFINITIONS:
      - _XOPEN_SOURCE
      CLANG_ENABLE_OBJC_ARC: true
      CLANG_WARN_DOCUMENTATION_COMMENTS: true
      OTHER_CFLAGS:
      - -fvisibility=hidden
    sources:
    - path: OrlixHostAdapter/fs/backing_io.m
      group: OrlixHostAdapter/fs
    - path: OrlixHostAdapter/fs/backing_dir.c
      group: OrlixHostAdapter/fs
    - path: OrlixHostAdapter/fs/backing_io_internal.h
      group: OrlixHostAdapter/fs
    - path: OrlixHostAdapter/fs/errno_translation.c
      group: OrlixHostAdapter/fs
    - path: OrlixHostAdapter/fs/open_flags.c
      group: OrlixHostAdapter/fs
    - path: OrlixHostAdapter/fs/path.c
      group: OrlixHostAdapter/fs
    - path: OrlixHostAdapter/fs/memfd.c
      group: OrlixHostAdapter/fs
    - path: OrlixHostAdapter/fs/backing_paths.m
      group: OrlixHostAdapter/fs
    - path: OrlixHostAdapter/fs/epoll_mask.c
      group: OrlixHostAdapter/fs
    - path: OrlixHostAdapter/kernel/signal.c
      group: OrlixHostAdapter/kernel
    - path: OrlixHostAdapter/kernel/sync.c
      group: OrlixHostAdapter/kernel
    - path: OrlixHostAdapter/kernel/clock.c
      group: OrlixHostAdapter/kernel
    - path: OrlixHostAdapter/fs/sync.c
      group: OrlixHostAdapter/fs
  OrlixKernelTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    sources:
    - OrlixKernelTests/SignalTests.m
    - OrlixKernelTests/TaskGroupTests.m
    - OrlixKernelTests/CgroupTests.m
    - OrlixKernelTests/CredentialTests.m
    - OrlixKernelTests/VFSPathTests.m
    - OrlixKernelTests/FutexTests.m
    - OrlixKernelTests/RootfsBootstrapTests.m
    - OrlixKernelTests/KernelBootTests.m
    - OrlixKernelTests/KernelInitTests.m
    - OrlixKernelTests/PTYSessionTests.m
    - OrlixKernelTests/PTYJobControlTests.m
    - OrlixKernelTests/WaitJobControlTests.m
    - OrlixKernelTests/PipeTests.m
    - OrlixKernelTests/ReadinessTests.m
    - OrlixKernelTests/EpollTests.m
    - OrlixKernelTests/FcntlTests.m
    - OrlixKernelTests/ExecFdTests.m
    - OrlixKernelTests/ExecSyscallTests.m
    - OrlixKernelTests/NativeSyscallTests.m
    - OrlixKernelTests/TaskExecTests.m
    - OrlixKernelTests/UTSTests.m
    - OrlixKernelTests/NamespaceTests.m
    - OrlixKernelTests/ProcfsNamespaceTests.m
    - OrlixKernelTests/DevfsTests.m
    - OrlixKernelTests/SeccompTests.m
    - OrlixKernelTests/PtraceTests.m
    - path: OrlixKernelTests/LinuxUAPICompileSmoke.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/MLibCPackageHeadersCompileSmoke.c
      compilerFlags:
      - -I$(SRCROOT)/OrlixMLibC/include
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/MLibCStatCompileSmoke.c
      compilerFlags:
      - -I$(SRCROOT)/OrlixMLibC/include
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/MLibCConfigureProbeCompileSmoke.c
      compilerFlags:
      - -I$(SRCROOT)/OrlixMLibC/include
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/KernelOwnerCompatCompileSmoke.c
    - path: OrlixKernelTests/LinuxKHeadersCompileSmoke.c
      compilerFlags:
      - -D__KERNEL__
      - -I$(LINUX_KHEADERS_GENERATED_ROOT)/arch/$(LINUX_ARCH)/include/generated
      - -I$(LINUX_KHEADERS_GENERATED_ROOT)/arch/$(LINUX_ARCH)/include/generated/uapi
      - -I$(LINUX_KHEADERS_SOURCE_ROOT)/arch/$(LINUX_ARCH)/include
      - -I$(LINUX_KHEADERS_SOURCE_ROOT)/arch/$(LINUX_ARCH)/include/uapi
      - -I$(LINUX_KHEADERS_GENERATED_ROOT)/include/generated/uapi
      - -I$(LINUX_KHEADERS_GENERATED_ROOT)/include
      - -I$(LINUX_KHEADERS_SOURCE_ROOT)/include/uapi
      - -I$(LINUX_KHEADERS_SOURCE_ROOT)/include
    - path: OrlixKernelTests/KernelBoot.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/KernelInitContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/PTYSessionContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/PTYJobControlContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/WaitJobControlContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/PipeContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/ReadinessContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/EpollContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/PtraceContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/PTYSessionContract.h
    - OrlixKernelTests/PTYJobControlContract.h
    - OrlixKernelTests/WaitJobControlContract.h
    - OrlixKernelTests/PipeContract.h
    - OrlixKernelTests/ReadinessContract.h
    - OrlixKernelTests/EpollContract.h
    - OrlixKernelTests/PtraceContract.h
    - path: OrlixKernelTests/CgroupContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/CgroupContract.h
    - OrlixKernelTests/PTYSessionIoctlShim.c
    - path: OrlixKernelTests/FutexUAPICompileSmoke.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/FutexContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/FutexContract.h
    - path: OrlixKernelTests/LinuxUAPITestSupport.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/LinuxUAPITestSupport.h
    - path: OrlixKernelTests/VFSAtContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/FcntlContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/ExecFdContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/ExecSyscallContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/NativeSyscallContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/NativeSyscallContract.h
    - path: OrlixKernelTests/SignalSyscallContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/SignalSyscallContract.h
    - path: OrlixKernelTests/SyscallUioContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/SyscallUioContract.h
    - path: OrlixKernelTests/TaskExecContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: OrlixKernelTests/UTSContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/UTSContract.h
    - path: OrlixKernelTests/NamespaceContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/NamespaceContract.h
    - path: OrlixKernelTests/ProcfsNamespaceContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/ProcfsNamespaceContract.h
    - path: OrlixKernelTests/DevfsContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/DevfsContract.h
    - path: OrlixKernelTests/SeccompContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - OrlixKernelTests/SeccompContract.h
    dependencies:
    - target: OrlixKernel
    - target: OrlixHostAdapter
    settings:
      GENERATE_INFOPLIST_FILE: true
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/OrlixKernel
        - $(SRCROOT)/OrlixKernel/include
        - $(SRCROOT)/OrlixKernel/internal/private
      BUNDLE_LOADER: ''
  OrlixHostAdapterTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    sources:
    - OrlixHostAdapterTests/HostBridgeSmokeTests.m
    - OrlixHostAdapterTests/PTYHostBridgeTests.m
    - OrlixHostAdapterTests/VFSPathHostBridgeTests.m
    - OrlixHostAdapterTests/RootfsBootstrapTests.m
    - OrlixHostAdapterTests/HostTestSupport.c
    - OrlixHostAdapterTests/HostTestSupport.h
    - OrlixHostAdapterTests/PTYTestSupport.c
    - OrlixHostAdapterTests/PTYTestSupport.h
    dependencies:
    - target: OrlixKernel
    - target: OrlixHostAdapter
    settings:
      GENERATE_INFOPLIST_FILE: true
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/OrlixKernel
        - $(SRCROOT)/OrlixHostAdapterTests
        - $(SRCROOT)/OrlixKernel/include
        - $(SRCROOT)/OrlixKernel/internal/private
      BUNDLE_LOADER: ''
configurations:
  Debug:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      GCC_OPTIMIZATION_LEVEL: '0'
      SWIFT_OPTIMIZATION_LEVEL: -Onone
  Release:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      GCC_OPTIMIZATION_LEVEL: s
      SWIFT_OPTIMIZATION_LEVEL: -O
schemes:
  OrlixKernel-6.12-arm64:
    build:
      targets:
        OrlixKernel: all
        OrlixHostAdapter: all
        OrlixKernelTests: all
        OrlixHostAdapterTests: all
    test:
      targets:
      - OrlixKernelTests
      - OrlixHostAdapterTests
