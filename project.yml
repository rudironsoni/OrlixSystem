name: OrlixKernel
settings:
  base:
    GCC_TREAT_WARNINGS_AS_ERRORS: true
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    # End-state policy:
    # - OrlixKernel consumes only kernel-owned headers plus vendored Linux truth
    # - OrlixHostAdapter is private host implementation only
    # - cross-target declarations must move under OrlixKernel private contract roots
    # Current OrlixHostAdapter include usage is transitional until the seam refactor lands.
    LINUX_VERSION: '6.12'
    LINUX_ARCH: arm64
    LINUX_KERNEL_VENDOR_ROOT: $(SRCROOT)/OrlixKernel/vendor/linux
    LINUX_MLIBC_VENDOR_ROOT: $(SRCROOT)/OrlixMLibC/vendor/linux
    LINUX_KERNEL_KHEADERS_INCLUDE_ROOT: $(LINUX_KERNEL_VENDOR_ROOT)/$(LINUX_VERSION)/$(LINUX_ARCH)/kheaders/include
    LINUX_KERNEL_UAPI_INCLUDE_ROOT: $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/uapi
    LINUX_MLIBC_ROOT: $(LINUX_MLIBC_VENDOR_ROOT)/$(LINUX_VERSION)/$(LINUX_ARCH)
    LINUX_MLIBC_INCLUDE_ROOT: $(LINUX_MLIBC_ROOT)/include
    LINUX_ROOT: $(LINUX_KERNEL_VENDOR_ROOT)/$(LINUX_VERSION)/$(LINUX_ARCH)/kheaders
    LINUX_UAPI_ROOT: $(LINUX_KERNEL_UAPI_INCLUDE_ROOT)
    LINUX_UAPI_INCLUDE_ROOT: $(LINUX_KERNEL_UAPI_INCLUDE_ROOT)
    LINUX_MLIBC_UAPI_ROOT: $(LINUX_MLIBC_INCLUDE_ROOT)
    LINUX_MLIBC_UAPI_INCLUDE_ROOT: $(LINUX_MLIBC_INCLUDE_ROOT)
    LINUX_KHEADERS_ROOT: $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)
    CLANG_BUILTIN_INCLUDE_ROOT: $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/21/include
    LINUX_HOST_COMPAT_INCLUDE_ROOT: $(SRCROOT)/tools/linux_host_compat/include
    ORLIX_KERNEL_FREESTANDING_CFLAGS: >-
      -ffreestanding -fno-builtin -nostdinc
      -include $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/linux/kconfig.h
      -include $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/linux/types.h
      -include $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/linux/stddef.h
      -include $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/linux/bits.h
      -include $(LINUX_HOST_COMPAT_INCLUDE_ROOT)/macho_compat.h
      -Wno-shorten-64-to-32
    ORLIX_KERNEL_TEST_STRICT_CFLAGS: >-
      $(ORLIX_KERNEL_FREESTANDING_CFLAGS)
      -D__KERNEL__
      -isystem $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)
      -isystem $(LINUX_KERNEL_UAPI_INCLUDE_ROOT)
    ORLIX_KERNEL_UAPI_FREESTANDING_CFLAGS: >-
      -ffreestanding -fno-builtin -nostdinc
      -D__EXPORTED_HEADERS__
      -Wno-shorten-64-to-32
    ORLIX_KERNEL_TEST_UAPI_CFLAGS: >-
      $(ORLIX_KERNEL_UAPI_FREESTANDING_CFLAGS)
      -isystem $(LINUX_KERNEL_UAPI_INCLUDE_ROOT)
      -isystem $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)
targets:
  OrlixKernel:
    type: library.static
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    settings:
      ALWAYS_SEARCH_USER_PATHS: false
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/OrlixKernel
        - $(SRCROOT)/OrlixKernel/include
        - $(SRCROOT)/OrlixKernel/internal
      SYSTEM_HEADER_SEARCH_PATHS:
        - $(CLANG_BUILTIN_INCLUDE_ROOT)
        - $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)
        - $(LINUX_KERNEL_UAPI_INCLUDE_ROOT)
      GCC_PREPROCESSOR_DEFINITIONS:
      - __KERNEL__
      USE_HEADERMAP: false
      CLANG_ENABLE_MODULES: false
      CLANG_ENABLE_OBJC_ARC: true
      CLANG_WARN_DOCUMENTATION_COMMENTS: false
      OTHER_CFLAGS:
      - -ffreestanding
      - -fno-builtin
      - -Wno-macro-redefined
      - -Wno-shorten-64-to-32
      - -nostdinc
      - -include
      - $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/linux/kconfig.h
      - -include
      - $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/linux/types.h
      - -include
      - $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/linux/stddef.h
      - -include
      - $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/linux/bits.h
      - -include
      - $(LINUX_HOST_COMPAT_INCLUDE_ROOT)/macho_compat.h
      - -fvisibility=hidden
