name: OrlixSystem
options:
  bundleIdPrefix: org.orlix
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    CLANG_ENABLE_MODULES: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1"
    SWIFT_VERSION: "6.0"
packages:
  GhosttyKit:
    url: https://github.com/Lakr233/libghostty-spm.git
    branch: main
targets:
  OrlixKernel:
    type: framework
    platform: iOS
    sources:
      - path: boot
        includes:
          - "*.c"
      - path: OrlixHostAdapter/boot
        includes:
          - "*.c"
      - path: OrlixKernel/include
        buildPhase: headers
        headerVisibility: public
      - path: Build/OrlixKernel/xcframework-input/OrlixKernelPayload.bundle
        type: folder
        buildPhase: resources
        optional: true
    dependencies:
      - sdk: CoreFoundation.framework
    settings:
      base:
        DEFINES_MODULE: YES
        INFOPLIST_FILE: OrlixKernel/Support/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixKernel
        PRODUCT_NAME: OrlixKernel
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)
          - $(SRCROOT)/OrlixKernel/include
  OrlixTerminal:
    type: application
    platform: iOS
    sources:
      - path: OrlixTerminal
    dependencies:
      - target: OrlixKernel
        embed: true
      - package: GhosttyKit
        products:
          - GhosttyTerminal
          - GhosttyTheme
    settings:
      base:
        INFOPLIST_FILE: OrlixTerminal/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixTerminal
        PRODUCT_NAME: OrlixTerminal
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/OrlixKernel/include
        SWIFT_OBJC_BRIDGING_HEADER: OrlixTerminal/OrlixTerminal-Bridging-Header.h
  OrlixKernelPackagingTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixKernelPackagingTests
    dependencies:
      - target: OrlixTerminal
      - target: OrlixKernel
    settings:
      base:
        INFOPLIST_FILE: OrlixKernelPackagingTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixKernelPackagingTests
schemes:
  OrlixKernel:
    build:
      targets:
        OrlixKernel: all
  OrlixTerminal:
    build:
      targets:
        OrlixTerminal: all
    run:
      config: Debug
      executable: OrlixTerminal
  OrlixKernelPackaging:
    build:
      targets:
        OrlixKernel: all
        OrlixTerminal: all
        OrlixKernelPackagingTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixKernelPackagingTests
