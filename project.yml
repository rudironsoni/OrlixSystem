name: IXLandKernel
settings:
  base:
    GCC_TREAT_WARNINGS_AS_ERRORS: true
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    # End-state policy:
    # - IXLandKernel consumes only kernel-owned headers plus vendored Linux truth
    # - IXLandHostAdapter is private host implementation only
    # - cross-target declarations must move under IXLandKernel private contract roots
    # Current IXLandHostAdapter include usage is transitional until the seam refactor lands.
    LINUX_VERSION: '6.12'
    LINUX_ARCH: arm64
    LINUX_VENDOR_ROOT: $(SRCROOT)/third_party/linux
    LINUX_ROOT: $(LINUX_VENDOR_ROOT)/$(LINUX_VERSION)/$(LINUX_ARCH)
    LINUX_UAPI_ROOT: $(LINUX_ROOT)/uapi
    LINUX_UAPI_INCLUDE_ROOT: $(LINUX_UAPI_ROOT)/include
    LINUX_KHEADERS_ROOT: $(LINUX_ROOT)/kheaders
    LINUX_KHEADERS_SOURCE_ROOT: $(LINUX_KHEADERS_ROOT)/source
    LINUX_KHEADERS_GENERATED_ROOT: $(LINUX_KHEADERS_ROOT)/generated
targets:
  IXLandKernel:
    type: library.static
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    settings:
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/IXLandKernel
        - $(SRCROOT)/IXLandKernel/include
        - $(SRCROOT)/IXLandKernel/internal/private
        - $(LINUX_UAPI_INCLUDE_ROOT)
      GCC_PREPROCESSOR_DEFINITIONS:
      - _XOPEN_SOURCE
      CLANG_ENABLE_OBJC_ARC: true
      CLANG_WARN_DOCUMENTATION_COMMENTS: true
      OTHER_CFLAGS:
      - -fvisibility=hidden
    sources:
    - path: IXLandKernel/fs/eventpoll.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/exec.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/fcntl.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/fdtable.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/inode.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/ioctl.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/mount.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/namei.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/open.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/pipe.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/poll.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/pty.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/path.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/read_write.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/readdir.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/stat.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/uio.c
      group: IXLandKernel/fs
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernel/fs/super.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/vfs.c
      group: IXLandKernel/fs
    - path: IXLandKernel/fs/xattr.c
      group: IXLandKernel/fs
    - path: IXLandKernel/kernel/cgroup.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/cred.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/exit.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/fork.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/futex.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/init.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/mm.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/net/network.c
      group: IXLandKernel/kernel/net
    - path: IXLandKernel/kernel/net/socket.c
      group: IXLandKernel/kernel/net
    - path: IXLandKernel/kernel/net/socket.h
      group: IXLandKernel/kernel/net
    - path: IXLandKernel/kernel/pid.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/ptrace.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/random.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/resource.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/seccomp.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/signal.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/sync.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/sys.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/task.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/time.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/uts.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/wait_queue.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/kernel/wait.c
      group: IXLandKernel/kernel
    - path: IXLandKernel/observability/ixland_observability.c
      group: IXLandKernel/observability
    - path: IXLandKernel/runtime/aarch64/exec_context.c
      group: IXLandKernel/runtime/aarch64
    - path: IXLandKernel/runtime/aarch64/elf_reloc.c
      group: IXLandKernel/runtime/aarch64
    - path: IXLandKernel/runtime/syscall.c
      group: IXLandKernel/runtime
    - path: IXLandKernel/runtime/native/registry.c
      group: IXLandKernel/runtime/native
    dependencies:
    - target: IXLandHostAdapter
  IXLandHostAdapter:
    type: library.static
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    settings:
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/IXLandKernel
        - $(SRCROOT)/IXLandKernel/include
        - $(SRCROOT)/IXLandKernel/internal/private
        - $(LINUX_UAPI_INCLUDE_ROOT)
      GCC_PREPROCESSOR_DEFINITIONS:
      - _XOPEN_SOURCE
      CLANG_ENABLE_OBJC_ARC: true
      CLANG_WARN_DOCUMENTATION_COMMENTS: true
      OTHER_CFLAGS:
      - -fvisibility=hidden
    sources:
    - path: IXLandHostAdapter/fs/backing_io.m
      group: IXLandHostAdapter/fs
    - path: IXLandHostAdapter/fs/backing_io_internal.h
      group: IXLandHostAdapter/fs
    - path: IXLandHostAdapter/fs/errno_translation.c
      group: IXLandHostAdapter/fs
    - path: IXLandHostAdapter/fs/open_flags.c
      group: IXLandHostAdapter/fs
    - path: IXLandHostAdapter/fs/path.c
      group: IXLandHostAdapter/fs
    - path: IXLandHostAdapter/fs/memfd.c
      group: IXLandHostAdapter/fs
    - path: IXLandHostAdapter/fs/backing_paths.m
      group: IXLandHostAdapter/fs
    - path: IXLandHostAdapter/fs/epoll_mask.c
      group: IXLandHostAdapter/fs
    - path: IXLandHostAdapter/kernel/signal.c
      group: IXLandHostAdapter/kernel
    - path: IXLandHostAdapter/kernel/sync.c
      group: IXLandHostAdapter/kernel
    - path: IXLandHostAdapter/kernel/clock.c
      group: IXLandHostAdapter/kernel
    - path: IXLandHostAdapter/fs/sync.c
      group: IXLandHostAdapter/fs
  IXLandKernelTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    sources:
    - IXLandKernelTests/SignalTests.m
    - IXLandKernelTests/TaskGroupTests.m
    - IXLandKernelTests/CgroupTests.m
    - IXLandKernelTests/CredentialTests.m
    - IXLandKernelTests/VFSPathTests.m
    - IXLandKernelTests/FutexTests.m
    - IXLandKernelTests/RootfsBootstrapTests.m
    - IXLandKernelTests/KernelBootTests.m
    - IXLandKernelTests/KernelInitTests.m
    - IXLandKernelTests/PTYSessionTests.m
    - IXLandKernelTests/PTYJobControlTests.m
    - IXLandKernelTests/WaitJobControlTests.m
    - IXLandKernelTests/PipeTests.m
    - IXLandKernelTests/ReadinessTests.m
    - IXLandKernelTests/EpollTests.m
    - IXLandKernelTests/FcntlTests.m
    - IXLandKernelTests/ExecFdTests.m
    - IXLandKernelTests/ExecSyscallTests.m
    - IXLandKernelTests/NativeSyscallTests.m
    - IXLandKernelTests/TaskExecTests.m
    - IXLandKernelTests/UTSTests.m
    - IXLandKernelTests/NamespaceTests.m
    - IXLandKernelTests/ProcfsNamespaceTests.m
    - IXLandKernelTests/DevfsTests.m
    - IXLandKernelTests/SeccompTests.m
    - IXLandKernelTests/PtraceTests.m
    - path: IXLandKernelTests/LinuxUAPICompileSmoke.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/LinuxKHeadersCompileSmoke.c
      compilerFlags:
      - -D__KERNEL__
      - -I$(LINUX_KHEADERS_GENERATED_ROOT)/arch/$(LINUX_ARCH)/include/generated
      - -I$(LINUX_KHEADERS_GENERATED_ROOT)/arch/$(LINUX_ARCH)/include/generated/uapi
      - -I$(LINUX_KHEADERS_SOURCE_ROOT)/arch/$(LINUX_ARCH)/include
      - -I$(LINUX_KHEADERS_SOURCE_ROOT)/arch/$(LINUX_ARCH)/include/uapi
      - -I$(LINUX_KHEADERS_GENERATED_ROOT)/include/generated/uapi
      - -I$(LINUX_KHEADERS_GENERATED_ROOT)/include
      - -I$(LINUX_KHEADERS_SOURCE_ROOT)/include/uapi
      - -I$(LINUX_KHEADERS_SOURCE_ROOT)/include
    - path: IXLandKernelTests/KernelBoot.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/KernelInitContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/PTYSessionContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/PTYJobControlContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/WaitJobControlContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/PipeContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/ReadinessContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/EpollContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/PtraceContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - IXLandKernelTests/PTYSessionContract.h
    - IXLandKernelTests/PTYJobControlContract.h
    - IXLandKernelTests/WaitJobControlContract.h
    - IXLandKernelTests/PipeContract.h
    - IXLandKernelTests/ReadinessContract.h
    - IXLandKernelTests/EpollContract.h
    - IXLandKernelTests/PtraceContract.h
    - path: IXLandKernelTests/CgroupContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - IXLandKernelTests/CgroupContract.h
    - IXLandKernelTests/PTYSessionIoctlShim.c
    - path: IXLandKernelTests/FutexUAPICompileSmoke.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/FutexContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - IXLandKernelTests/FutexContract.h
    - path: IXLandKernelTests/LinuxUAPITestSupport.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - IXLandKernelTests/LinuxUAPITestSupport.h
    - path: IXLandKernelTests/VFSAtContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/FcntlContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/ExecFdContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/ExecSyscallContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/NativeSyscallContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - IXLandKernelTests/NativeSyscallContract.h
    - path: IXLandKernelTests/SignalSyscallContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - IXLandKernelTests/SignalSyscallContract.h
    - path: IXLandKernelTests/SyscallUioContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - IXLandKernelTests/SyscallUioContract.h
    - path: IXLandKernelTests/TaskExecContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - path: IXLandKernelTests/UTSContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - IXLandKernelTests/UTSContract.h
    - path: IXLandKernelTests/NamespaceContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - IXLandKernelTests/NamespaceContract.h
    - path: IXLandKernelTests/ProcfsNamespaceContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - IXLandKernelTests/ProcfsNamespaceContract.h
    - path: IXLandKernelTests/DevfsContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - IXLandKernelTests/DevfsContract.h
    - path: IXLandKernelTests/SeccompContract.c
      compilerFlags:
      - -I$(LINUX_UAPI_INCLUDE_ROOT)
    - IXLandKernelTests/SeccompContract.h
    dependencies:
    - target: IXLandKernel
    - target: IXLandHostAdapter
    settings:
      GENERATE_INFOPLIST_FILE: true
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/IXLandKernel
        - $(SRCROOT)/IXLandKernel/include
        - $(SRCROOT)/IXLandKernel/internal/private
      BUNDLE_LOADER: ''
  IXLandHostAdapterTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    sources:
    - IXLandHostAdapterTests/HostBridgeSmokeTests.m
    - IXLandHostAdapterTests/PTYHostBridgeTests.m
    - IXLandHostAdapterTests/VFSPathHostBridgeTests.m
    - IXLandHostAdapterTests/RootfsBootstrapTests.m
    - IXLandHostAdapterTests/HostTestSupport.c
    - IXLandHostAdapterTests/HostTestSupport.h
    - IXLandHostAdapterTests/PTYTestSupport.c
    - IXLandHostAdapterTests/PTYTestSupport.h
    dependencies:
    - target: IXLandKernel
    - target: IXLandHostAdapter
    settings:
      GENERATE_INFOPLIST_FILE: true
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/IXLandKernel
        - $(SRCROOT)/IXLandHostAdapterTests
        - $(SRCROOT)/IXLandKernel/include
        - $(SRCROOT)/IXLandKernel/internal/private
      BUNDLE_LOADER: ''
configurations:
  Debug:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      GCC_OPTIMIZATION_LEVEL: '0'
      SWIFT_OPTIMIZATION_LEVEL: -Onone
  Release:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      GCC_OPTIMIZATION_LEVEL: s
      SWIFT_OPTIMIZATION_LEVEL: -O
schemes:
  IXLandKernel-6.12-arm64:
    build:
      targets:
        IXLandKernel: all
        IXLandHostAdapter: all
        IXLandKernelTests: all
        IXLandHostAdapterTests: all
    test:
      targets:
      - IXLandKernelTests
      - IXLandHostAdapterTests
