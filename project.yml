name: OrlixKernel
settings:
  base:
    GCC_TREAT_WARNINGS_AS_ERRORS: true
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    # End-state policy:
    # - OrlixKernel consumes only kernel-owned headers plus vendored Linux truth
    # - OrlixHostAdapter is private host implementation only
    # - cross-target declarations must move under OrlixKernel private contract roots
    # Current OrlixHostAdapter include usage is transitional until the seam refactor lands.
    LINUX_VERSION: '6.12'
    LINUX_ARCH: arm64
    LINUX_VENDOR_ROOT: $(SRCROOT)/third_party/linux
    LINUX_ROOT: $(LINUX_VENDOR_ROOT)/$(LINUX_VERSION)/$(LINUX_ARCH)
    LINUX_UAPI_ROOT: $(LINUX_ROOT)/uapi
    LINUX_UAPI_INCLUDE_ROOT: $(LINUX_UAPI_ROOT)/include
    LINUX_KHEADERS_ROOT: $(LINUX_ROOT)/kheaders
    LINUX_KHEADERS_SOURCE_ROOT: $(LINUX_KHEADERS_ROOT)/source
    LINUX_KHEADERS_GENERATED_ROOT: $(LINUX_KHEADERS_ROOT)/generated
targets:
  OrlixKernel:
    type: library.static
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    settings:
      ALWAYS_SEARCH_USER_PATHS: false
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/OrlixKernel
        - $(SRCROOT)/OrlixKernel/include
        - $(SRCROOT)/OrlixKernel/internal
        - $(LINUX_KHEADERS_GENERATED_ROOT)/arch/$(LINUX_ARCH)/include/generated
        - $(LINUX_KHEADERS_GENERATED_ROOT)/include
        - $(LINUX_KHEADERS_SOURCE_ROOT)/arch/$(LINUX_ARCH)/include
        - $(LINUX_KHEADERS_SOURCE_ROOT)/include
        - $(LINUX_KHEADERS_GENERATED_ROOT)/arch/$(LINUX_ARCH)/include/generated/uapi
        - $(LINUX_KHEADERS_SOURCE_ROOT)/arch/$(LINUX_ARCH)/include/uapi
        - $(LINUX_KHEADERS_GENERATED_ROOT)/include/generated/uapi
        - $(LINUX_KHEADERS_SOURCE_ROOT)/include/uapi
      SYSTEM_HEADER_SEARCH_PATHS:
        - $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/21/include
        - $(SDKROOT)/usr/include
      GCC_PREPROCESSOR_DEFINITIONS:
      - __KERNEL__
      - _XOPEN_SOURCE
      - _DARWIN_C_SOURCE
      - _POSIX_C_SOURCE=200112L
      USE_HEADERMAP: false
      CLANG_ENABLE_MODULES: false
      CLANG_ENABLE_OBJC_ARC: true
      CLANG_WARN_DOCUMENTATION_COMMENTS: true
      OTHER_CFLAGS:
      - -nostdinc
      - -include
      - $(LINUX_KHEADERS_SOURCE_ROOT)/include/linux/kconfig.h
      - -fvisibility=hidden
    headers:
    - path: third_party/linux/6.12/arm64/kheaders/generated/arch/arm64/include/generated
      type: folder
    - path: third_party/linux/6.12/arm64/kheaders/generated/include
      type: folder
    - path: third_party/linux/6.12/arm64/kheaders/source/arch/arm64/include
      type: folder
    - path: third_party/linux/6.12/arm64/kheaders/source/include
      type: folder
    - path: third_party/linux/6.12/arm64/kheaders/generated/arch/arm64/include/generated/uapi
      type: folder
    - path: third_party/linux/6.12/arm64/kheaders/source/arch/arm64/include/uapi
      type: folder
    - path: third_party/linux/6.12/arm64/kheaders/generated/include/generated/uapi
      type: folder
    - path: third_party/linux/6.12/arm64/kheaders/source/include/uapi
      type: folder
    sources:
    - path: OrlixKernel/fs/eventpoll.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/exec.c
      group: OrlixKernel/fs
      compilerFlags:
      - -I$(LINUX_UAPI_ROOT)
    - path: OrlixKernel/fs/fcntl.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/fdtable.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/inode.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/ioctl.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/mount.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/namei.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/open.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/pipe.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/poll.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/pty.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/path.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/read_write.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/readdir.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/stat.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/uio.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/super.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/vfs.c
      group: OrlixKernel/fs
    - path: OrlixKernel/fs/xattr.c
      group: OrlixKernel/fs
    - path: OrlixKernel/kernel/cgroup.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/cred.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/exit.c
      group: OrlixKernel/kernel
    - path: OrlixKernel/kernel/fork.c
