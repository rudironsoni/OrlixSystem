name: Orlix
options:
  postGenCommand: >-
    perl -pi -e 's/container:Orlix\.xcodeproj/container:OrlixKernel.xcodeproj/g' Orlix.xcodeproj/xcshareddata/xcschemes/*.xcscheme
    && rm -rf OrlixKernel.xcodeproj
    && mv Orlix.xcodeproj OrlixKernel.xcodeproj
settings:
  base:
    GCC_TREAT_WARNINGS_AS_ERRORS: true
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    LINUX_VERSION: '6.12'
    LINUX_ARCH: arm64
    LINUX_KERNEL_VENDOR_ROOT: $(SRCROOT)/OrlixKernel/vendor/linux
    LINUX_KERNEL_KHEADERS_INCLUDE_ROOT: $(LINUX_KERNEL_VENDOR_ROOT)/$(LINUX_VERSION)/$(LINUX_ARCH)/kheaders/include
    LINUX_KERNEL_UAPI_INCLUDE_ROOT: $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/uapi
    CLANG_BUILTIN_INCLUDE_ROOT: $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/21/include
targets:
  OrlixKernel:
    type: library.static
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    settings:
      ALWAYS_SEARCH_USER_PATHS: false
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/OrlixKernel/include
      USE_HEADERMAP: false
      CLANG_ENABLE_MODULES: false
      CLANG_ENABLE_OBJC_ARC: true
      CLANG_WARN_DOCUMENTATION_COMMENTS: false
      OTHER_CFLAGS:
        - -fvisibility=hidden
    sources:
      - path: boot/dtb.c
      - path: boot/image.c
      - path: boot/initrd.c
      - path: boot/loader.c
      - path: boot/params.c
      - path: boot/rootfs.c
      - path: OrlixKernel/include
        buildPhase: headers
        headerVisibility: public
  OrlixHostAdapter:
    type: library.static
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    settings:
      ALWAYS_SEARCH_USER_PATHS: false
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)
        - $(SRCROOT)/OrlixKernel
        - $(SRCROOT)/OrlixKernel/include
        - $(SRCROOT)/OrlixKernel/internal
        - $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)
        - $(LINUX_KERNEL_UAPI_INCLUDE_ROOT)
      SYSTEM_HEADER_SEARCH_PATHS:
        - $(CLANG_BUILTIN_INCLUDE_ROOT)
      GCC_PREPROCESSOR_DEFINITIONS:
        - _XOPEN_SOURCE
      CLANG_ENABLE_OBJC_ARC: true
      CLANG_WARN_DOCUMENTATION_COMMENTS: true
      OTHER_CFLAGS:
        - -fvisibility=hidden
    sources:
      - path: OrlixHostAdapter/fs/backing_dir.c
      - path: OrlixHostAdapter/fs/backing_io.m
      - path: OrlixHostAdapter/fs/backing_io_internal.h
      - path: OrlixHostAdapter/fs/backing_paths.m
      - path: OrlixHostAdapter/fs/backing_stat_translate.c
        compilerFlags:
          - -I$(LINUX_KERNEL_UAPI_INCLUDE_ROOT)
      - path: OrlixHostAdapter/fs/backing_stat_translate.h
      - path: OrlixHostAdapter/fs/errno_translation.c
      - path: OrlixHostAdapter/fs/errno_translation.h
      - path: OrlixHostAdapter/fs/memfd.c
      - path: OrlixHostAdapter/fs/open_flags.c
        compilerFlags:
          - -I$(LINUX_KERNEL_UAPI_INCLUDE_ROOT)
      - path: OrlixHostAdapter/fs/path.c
        compilerFlags:
          - -I$(LINUX_KERNEL_UAPI_INCLUDE_ROOT)
      - path: OrlixHostAdapter/fs/sync.c
      - path: OrlixHostAdapter/kernel/clock.c
        compilerFlags:
          - -D__KERNEL__
          - -include
          - $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/linux/kconfig.h
          - -I$(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)
          - -I$(LINUX_KERNEL_UAPI_INCLUDE_ROOT)
      - path: OrlixHostAdapter/kernel/fork.c
      - path: OrlixHostAdapter/kernel/random.c
      - path: OrlixHostAdapter/kernel/slab.c
        compilerFlags:
          - -D__KERNEL__
          - -include
          - $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/linux/kconfig.h
          - -I$(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)
          - -I$(LINUX_KERNEL_UAPI_INCLUDE_ROOT)
      - path: OrlixHostAdapter/kernel/sync.c
        compilerFlags:
          - -D__KERNEL__
          - -include
          - $(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)/linux/kconfig.h
          - -I$(LINUX_KERNEL_KHEADERS_INCLUDE_ROOT)
          - -I$(LINUX_KERNEL_UAPI_INCLUDE_ROOT)
      - path: OrlixHostAdapter/runtime/sync.h
configurations:
  Debug:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      GCC_OPTIMIZATION_LEVEL: '0'
      SWIFT_OPTIMIZATION_LEVEL: -Onone
  Release:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      GCC_OPTIMIZATION_LEVEL: s
      SWIFT_OPTIMIZATION_LEVEL: -O
schemes:
  OrlixKernel-6.12-arm64:
    build:
      targets:
        OrlixKernel: all
        OrlixHostAdapter: all
