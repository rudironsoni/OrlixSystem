name: OrlixSystem
options:
  bundleIdPrefix: org.orlix
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    CLANG_ENABLE_MODULES: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1"
    SWIFT_VERSION: "6.0"
packages:
  GhosttyKit:
    url: https://github.com/Lakr233/libghostty-spm.git
    exactVersion: 1.2.2
targets:
  OrlixKernel:
    type: framework
    platform: iOS
    sources:
      - path: OrlixKernel/Sources/boot
        includes:
          - "*.c"
      - path: OrlixHostAdapter/Sources/OrlixHostAdapter/boot
        includes:
          - "*.c"
      - path: OrlixHostAdapter/Sources/OrlixHostAdapter/terminal
        includes:
          - "*.c"
      - path: OrlixHostAdapter/Sources/OrlixHostAdapter/memory
        includes:
          - "*.c"
      - path: OrlixHostAdapter/Sources/OrlixHostAdapter/runtime
        includes:
          - "*.c"
      - path: OrlixKernel/Sources/include
        buildPhase: headers
        headerVisibility: public
    dependencies:
      - sdk: CoreFoundation.framework
    postBuildScripts:
      - name: Embed OrlixKernel Payload
        basedOnDependencyAnalysis: false
        script: |
          set -eu
          payload="$SRCROOT/Build/OrlixKernel/payload/OrlixKernelPayload.bundle"
          if [ ! -d "$payload" ]; then
              echo "missing OrlixKernel payload bundle: $payload" >&2
              echo "run: make build PROFILE=${ORLIX_PROFILE:-release}" >&2
              exit 1
          fi
          destination="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/OrlixKernelPayload.bundle"
          rm -rf "$destination"
          cp -R "$payload" "$destination"
    settings:
      base:
        DEFINES_MODULE: YES
        INFOPLIST_FILE: OrlixKernel/Sources/Support/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixKernel
        PRODUCT_NAME: OrlixKernel
        ORLIX_PROFILE: release
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/OrlixKernel/Sources
          - $(SRCROOT)/OrlixKernel/Sources/include
          # Temporary arch boot seam include only. Do not add generic Linux
          # or generated Kbuild include roots to Xcode targets.
          - $(SRCROOT)/OrlixKernel/Sources/ports/orlix/overlay/arch/orlix/include
          - $(SRCROOT)/OrlixHostAdapter/Sources
        OTHER_LDFLAGS:
          - $(inherited)
          - $(SRCROOT)/Build/OrlixKernel/$(ORLIX_PROFILE)/$(PLATFORM_NAME)/OrlixKernel.a
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - ORLIX_APP_HOSTED_BOOT=1
  OrlixKit:
    type: framework
    platform: iOS
    sources:
      - path: OrlixKit/Sources
    dependencies:
      - target: OrlixKernel
    settings:
      base:
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixKit
        PRODUCT_NAME: OrlixKit
  OrlixKitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixKit/Tests/XCTest/OrlixKitTests
    dependencies:
      - target: OrlixTestRunner
      - target: OrlixKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixKitTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTestRunner.app/OrlixTestRunner
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixTerminal:
    type: application
    platform: iOS
    sources:
      - path: OrlixTerminal/Sources
    dependencies:
      - target: OrlixKit
        embed: true
      - target: OrlixKernel
        embed: true
      - package: GhosttyKit
        products:
          - GhosttyTerminal
          - GhosttyTheme
    settings:
      base:
        INFOPLIST_FILE: OrlixTerminal/Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixTerminal
        PRODUCT_NAME: OrlixTerminal
  OrlixTestRunner:
    type: application
    platform: iOS
    sources:
      - path: OrlixTestRunner/Sources
    dependencies:
      - target: OrlixKit
        embed: true
      - target: OrlixKernel
        embed: true
    postBuildScripts:
      - name: Embed Orlix Upstream Test Rootfs Bundles
        basedOnDependencyAnalysis: false
        script: |
          set -eu
          profile="${ORLIX_PROFILE:-release}"
          copy_if_present() {
              source="$SRCROOT/$1"
              name="$2"
              destination="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/$name"
              if [ -d "$source" ]; then
                  rm -rf "$destination"
                  cp -R "$source" "$destination"
              fi
          }
          copy_if_present "Build/OrlixKernel/test-initramfs/$profile/OrlixTestInitramfs.bundle" "OrlixTestInitramfs.bundle"
          copy_if_present "Build/OrlixMLibC/test-initramfs/$profile/OrlixMLibCTestInitramfs.bundle" "OrlixMLibCTestInitramfs.bundle"
          copy_if_present "Build/OrlixOS/test-initramfs/$profile/CoreutilsTestInitramfs.bundle" "CoreutilsTestInitramfs.bundle"
    settings:
      base:
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixTestRunner
        PRODUCT_NAME: OrlixTestRunner
        ORLIX_PROFILE: release
  OrlixKernelHostProofTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixKernel/Tests/XCTest/OrlixKernelHostProofTests
    dependencies:
      - target: OrlixTerminal
      - target: OrlixKernel
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixKernelHostProofTests
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/OrlixKernel/Sources/include
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - ORLIX_APP_HOSTED_BOOT=1
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTerminal.app/OrlixTerminal
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixLinuxProofOutputParserTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixKernel/Tests/XCTest/OrlixLinuxProofOutputParserTests
      - path: OrlixKernel/Tests/Fixtures/KUnit
        type: folder
        buildPhase: resources
      - path: OrlixKernel/Tests/Fixtures/Kselftest
        type: folder
        buildPhase: resources
    dependencies:
      - target: OrlixTerminal
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixLinuxProofOutputParserTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTerminal.app/OrlixTerminal
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixHostAdapterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixHostAdapter/Tests/XCTest/OrlixHostAdapterTests
    dependencies:
      - target: OrlixTerminal
      - target: OrlixKernel
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixHostAdapterTests
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/OrlixHostAdapter/Sources
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTerminal.app/OrlixTerminal
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixTerminalProofDriverTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixTerminal/Tests/XCTest/OrlixTerminalProofDriverTests
    dependencies:
      - target: OrlixTerminal
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixTerminalProofDriverTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTerminal.app/OrlixTerminal
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixTestRunnerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixTestRunner/Tests/XCTest/OrlixTestRunnerTests
    dependencies:
      - target: OrlixTestRunner
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixTestRunnerTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTestRunner.app/OrlixTestRunner
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixKernelUpstreamTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixTestRunner/Tests/XCTest/Support
      - path: OrlixTestRunner/Tests/XCTest/OrlixKernelUpstreamTests
    dependencies:
      - target: OrlixTestRunner
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixKernelUpstreamTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTestRunner.app/OrlixTestRunner
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixMLibCUpstreamTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixTestRunner/Tests/XCTest/Support
      - path: OrlixTestRunner/Tests/XCTest/OrlixMLibCUpstreamTests
    dependencies:
      - target: OrlixTestRunner
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixMLibCUpstreamTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTestRunner.app/OrlixTestRunner
        BUNDLE_LOADER: $(TEST_HOST)
  OrlixCoreutilsUpstreamTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrlixTestRunner/Tests/XCTest/Support
      - path: OrlixTestRunner/Tests/XCTest/OrlixCoreutilsUpstreamTests
    dependencies:
      - target: OrlixTestRunner
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.orlix.OrlixCoreutilsUpstreamTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OrlixTestRunner.app/OrlixTestRunner
        BUNDLE_LOADER: $(TEST_HOST)
schemes:
  OrlixKernel:
    build:
      targets:
        OrlixKernel: all
  OrlixTerminal:
    build:
      targets:
        OrlixTerminal: all
    run:
      config: Debug
      executable: OrlixTerminal
  OrlixKitTests:
    build:
      targets:
        OrlixTestRunner: all
        OrlixKitTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixKitTests
  OrlixKernelHostProofTests:
    build:
      targets:
        OrlixTerminal: all
        OrlixKernelHostProofTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixKernelHostProofTests
  OrlixLinuxProofOutputParserTests:
    build:
      targets:
        OrlixTerminal: all
        OrlixLinuxProofOutputParserTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixLinuxProofOutputParserTests
  OrlixHostAdapterTests:
    build:
      targets:
        OrlixTerminal: all
        OrlixHostAdapterTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixHostAdapterTests
  OrlixTerminalProofDriverTests:
    build:
      targets:
        OrlixTerminal: all
        OrlixTerminalProofDriverTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixTerminalProofDriverTests
  OrlixTestRunnerTests:
    build:
      targets:
        OrlixTestRunner: all
        OrlixTestRunnerTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixTestRunnerTests
  OrlixKernelUpstreamTests:
    build:
      targets:
        OrlixTestRunner: all
        OrlixKernelUpstreamTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixKernelUpstreamTests
  OrlixMLibCUpstreamTests:
    build:
      targets:
        OrlixTestRunner: all
        OrlixMLibCUpstreamTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixMLibCUpstreamTests
  OrlixCoreutilsUpstreamTests:
    build:
      targets:
        OrlixTestRunner: all
        OrlixCoreutilsUpstreamTests: test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: OrlixCoreutilsUpstreamTests
